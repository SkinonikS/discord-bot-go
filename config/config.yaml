database:
  host: "${DB_POSTGRES_HOST:localhost}"
  port: "${DB_POSTGRES_PORT:5432}"
  user: "${DB_POSTGRES_USER:discord_bot}"
  password: "${DB_POSTGRES_PASSWORD:root}"
  db: "${DB_POSTGRES_DB:discord_bot}"
  sslMode: "${DB_POSTGRES_SSLMODE:disable}"
app:
  name: "${APP_NAME:discord-bot}"
  debug: ${APP_DEBUG:false}
  repository: "${APP_REPOSITORY:''}"
httpServer:
  addr: "${HTTP_SERVER_ADDR:':8081'}"
logger:
  level: "${LOG_LEVEL:debug}"
  disable: ${LOG_DISABLE:false}
discord:
  workerCount: ${DISCORD_WORKER_COUNT:5}
  appID: "${DISCORD_APP_ID}"
  token: "${DISCORD_TOKEN}"
  shardID: ${DISCORD_SHARD_ID:0}
  shardCount: ${DISCORD_SHARD_COUNT:1}
lavaLink:
  nodes:
    - name: "main"
      host: "${LAVALINK_MAIN_NODE_HOST:''}"
      port: "${LAVALINK_MAIN_NODE_PORT:2333}"
      password: "${LAVALINK_MAIN_NODE_PASSWORD:password}"
      secure: "${LAVALINK_MAIN_NODE_SECURE:false}"
translator:
  defaultLocale: "${TRANSLATOR_DEFAULT_LOCALE:en-US}"
  availableLocales:
    - "ru"
service:
  musicPlayer:
    idleTimeout: "${MUSIC_PLAYER_IDLE_TIMEOUT:30m}"