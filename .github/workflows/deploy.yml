name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BOT_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: discord_bot
          POSTGRES_PASSWORD: root
          POSTGRES_DB: discord_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      lavalink:
        image: ghcr.io/lavalink-devs/lavalink:4-alpine
        env:
          SERVER_PORT: 2333
          LAVALINK_SERVER_PASSWORD: root
          LAVALINK_SERVER_SOURCES_YOUTUBE: "false"
          LAVALINK_PLUGINS_0_DEPENDENCY: "dev.lavalink.youtube:youtube-plugin:1.18.0"
          LAVALINK_PLUGINS_0_SNAPSHOT: "false"
          LAVALINK_PLUGINS_1_DEPENDENCY: "com.github.topi314.lavaqueue:lavaqueue-plugin:176e311"
          LAVALINK_PLUGINS_1_SNAPSHOT: "true"
        ports:
          - 2333:2333
        options: >-
          --health-cmd "wget -q -O- --header='Authorization: root' http://localhost:2333/version || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -count=1 ./...
        env:
          DB_POSTGRES_HOST: "${{ job.services.postgres.host }}"
          DB_POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          DB_POSTGRES_USER: discord_bot
          DB_POSTGRES_PASSWORD: root
          DB_POSTGRES_DB: discord_bot
          DB_POSTGRES_SSLMODE: disable
          LAVALINK_MAIN_NODE_HOST: "${{ job.services.lavalink.host }}"
          LAVALINK_MAIN_NODE_PORT: ${{ job.services.lavalink.ports[2333] }}
          LAVALINK_MAIN_NODE_PASSWORD: root
          LAVALINK_MAIN_NODE_SECURE: false

  build-push:
    name: Build & push bot image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push bot image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.BOT_IMAGE }}:${{ github.sha }}
            ${{ env.BOT_IMAGE }}:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            TAG=latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -f k8s/ --recursive

      - name: Update bot image
        run: |
          kubectl set image deployment/discord-bot \
            discord-bot=${{ env.BOT_IMAGE }}:${{ github.sha }} \
            -n discord-bot

      - name: Wait for rollout
        run: kubectl rollout status deployment/discord-bot -n discord-bot --timeout=120s
