apiVersion: v1
kind: ConfigMap
metadata:
  name: lavalink-config
  namespace: discord-bot
data:
  application.yml: |
    server:
      port: 2333
      address: 0.0.0.0

    lavalink:
      server:
        sources:
          youtube: false
      plugins:
        - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
          snapshot: false
        - dependency: "com.github.topi314.lavaqueue:lavaqueue-plugin:7b32f42"
          snapshot: true

    plugins:
      youtube:
        enabled: true
        allowSearch: true
        allowDirectVideoIds: true
        allowDirectPlaylistIds: true
        clients:
          - MUSIC
          - ANDROID_VR
          - WEB
          - WEBEMBEDDED

    logging:
      level:
        root: INFO
        lavalink: INFO
